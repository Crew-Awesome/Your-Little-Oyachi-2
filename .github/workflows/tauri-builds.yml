name: Tauri Desktop Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: tauri-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundle: appimage
            artifact_name: oyachi-linux-appimage
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundle: nsis
            artifact_name: oyachi-windows-exe
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundle: app
            artifact_name: oyachi-macos-app
            artifact_path: src-tauri/target/release/bundle/macos/*.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri bundle
        run: bun run tauri build --bundles ${{ matrix.bundle }}

      - name: Show generated bundles
        if: runner.os != 'Windows'
        shell: bash
        run: ls -R "src-tauri/target/release/bundle"

      - name: Show generated bundles (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Path src-tauri/target/release/bundle -Recurse

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
