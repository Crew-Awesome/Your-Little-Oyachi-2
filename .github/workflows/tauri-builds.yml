name: Tauri Desktop Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage
            artifact_name: oyachi-linux-appimage
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundle: nsis
            artifact_name: oyachi-windows-exe
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundle: app
            artifact_name: oyachi-macos-app
            artifact_path: src-tauri/target/release/bundle/**/**/*.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        shell: bash
        run: bun install

      - name: Build Tauri bundle
        shell: bash
        run: bunx tauri build --bundles ${{ matrix.bundle }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
