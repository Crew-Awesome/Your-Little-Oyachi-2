<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oyachi Game 2</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="loading-screen">Loading room...</div>
  <div id="transition-screen"></div>
  <div id="room-banner"></div>
  <div id="tooltip"></div>
  <aside id="costumes-menu" aria-hidden="true">
    <button id="costumes-menu-toggle" type="button" aria-label="Toggle costumes menu">›</button>
    <div id="costumes-menu-header">
      <div id="costumes-menu-title">Costumes</div>
    </div>
    <div id="costumes-grid">
      <label class="costume-card is-selected">
        <img src="assets/sprites/oyachi/idle-neutral.png" alt="Default costume preview" />
        <span class="costume-name">Default</span>
        <input type="checkbox" checked disabled />
      </label>
    </div>
    <div id="costumes-soon">Adding more costumes soon.</div>
  </aside>
  <div id="app"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
